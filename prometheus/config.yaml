correction:
  backoff_factor: 2.0
  base_delay_ms: 1000
  degradation_enabled: true
  enabled: true
  max_retries: 3
gene:
  auto_audit: true
  fusion_threshold: 0.7
  max_generations: 100
  mutation_rate: 0.1
logging:
  backup_count: 3
  file: ~/.hermes/tools/prometheus/prometheus.log
  level: INFO
  max_size_mb: 10
memory:
  decay_rate: 0.01
  episodic_capacity: 100
  longterm_capacity: 1000
  promotion_threshold: 0.8
  working_capacity: 20
model:
  fallback_model: claude-sonnet-4
  fallback_provider: anthropic
  max_tokens: 8192
  name: anthropic/claude-sonnet-4
  provider: openrouter
  temperature: '0.9'
paths:
  data_dir: ~/.hermes/tools/prometheus/data
  knowledge_dir: ~/.hermes/knowledge
  seed_vault: ~/.hermes/seed-vault
  skills_dir: ~/.hermes/skills
  snapshot_dir: ~/.hermes/tools/prometheus/snapshots
reflection:
  daily_review_enabled: true
  enabled: true
  observation_retention_days: 30
  proposal_threshold: 5
seed:
  auto_snapshot: true
  compression: l2
  default_format: markdown
  max_snapshots: 50
  semantic_dict_auto_extend: true
state:
  auto_reflect_on_error: true
  idle_timeout_ms: 300000
  max_transitions: 100
tools:
  max_concurrent: 3
  permission_level: standard
  timeout_ms: 30000

# Xget 集成配置
xget:
  enabled: true
  default_instance: "https://xget.xi-xu.me"
  fallback_enabled: true
  fallback_timeout_seconds: 10
  request_timeout_seconds: 30
  max_retries: 3
  retry_delay_seconds: 1.0
  load_balancing: "weighted_round_robin"  # 可选: "priority", "random", "weighted_round_robin"
  
  # Xget 实例列表
  instances:
    - url: "https://xget.xi-xu.me"
      priority: 0
      weight: 3
      enabled: true
    # 你可以添加更多镜像实例
    # - url: "https://xget-mirror1.example.com"
    #   priority: 1
    #   weight: 2
    #   enabled: true
  
  # 平台配置
  platforms:
    github:
      enabled: true
      xget_prefix: "https://xget.xi-xu.me/gh/"
    huggingface:
      enabled: true
      xget_prefix: "https://xget.xi-xu.me/hf/"
    pypi:
      enabled: true
      xget_prefix: "https://xget.xi-xu.me/pypi/"
    npm:
      enabled: true
      xget_prefix: "https://xget.xi-xu.me/npm/"

# ── 引导与工作空间配置 ──
bootstrap:
  workspace_dir: ~/.prometheus/workspace       # 工作空间根目录
  auto_create: true                            # 自动创建缺失的引导文件
  templates_dir: ~/.prometheus/templates       # 引导模板目录
  onboarding:
    interactive: true                          # 默认使用交互式引导
    default_provider: ""                       # 留空则自动检测
    default_channel: cli                       # 默认频道类型

# ── 频道系统配置 ──
channels:
  enabled: true                                # 是否启用频道系统
  default_type: cli                            # 默认频道类型
  auto_start: true                             # 系统启动时自动开启频道
  # 基础频道
  cli:
    enabled: true
    history_size: 100
  http_webhook:
    enabled: false
    host: 0.0.0.0
    port: 9090
    webhook_path: /webhook
  file_watch:
    enabled: false
    watch_dir: ~/.prometheus/inbox
    pattern: "*.md"
  # 第三方平台（可选，需要安装对应依赖）
  telegram:
    enabled: false
    token: ""
    webhook_url: ""
    allowed_chat_ids: []
  discord:
    enabled: false
    token: ""
    allowed_channel_ids: []
  slack:
    enabled: false
    bot_token: ""
    app_token: ""
    allowed_channel_ids: []
  feishu:
    enabled: false
    app_id: ""
    app_secret: ""
    verification_token: ""
  dingtalk:
    enabled: false
    app_key: ""
    app_secret: ""
  qqbot:
    enabled: false
    appid: ""
    token: ""
  wecom:
    enabled: false
    corpid: ""
    secret: ""
  web_socket:
    enabled: false
  mqtt:
    enabled: false
    broker: localhost
    port: 1883

# ── Agent 管理系统配置 ──
agents:
  enabled: true                                # 是否启用多 Agent 管理
  agents_dir: ~/.prometheus/agents             # Agent 配置存放目录
  persistence_file: agents.json                # 持久化文件名
  auto_create_default: true                    # 创建默认 Agent
  default_agent:
    name: prometheus-core
    description: "Prometheus 核心智能体"
  max_agents: 10                               # 最大 Agent 数量
  lifecycle:
    auto_restart: true                         # 异常退出自动重启
    restart_delay_seconds: 3
