num_episodes: 10
group_size: 4
learning_rate: 1.0e-5
num_training_steps: 1000
save_freq: 50
eval_freq: 50
logging_freq: 10
eval_batch_size: 1
save_dir: ./outputs/tblite
log_dir: ./logs/tblite

env:
  enabled_toolsets:
    - terminal
    - file
  disabled_toolsets:
    - messaging
    - cronjob
  max_agent_turns: 30
  terminal_backend: local
  terminal_timeout: 120
  terminal_lifetime: 3600
  tool_pool_size: 32
  tool_call_parser: hermes

server:
  type: openai
  name: gpt-4o
  temperature: 0.7
  max_tokens: 2048
