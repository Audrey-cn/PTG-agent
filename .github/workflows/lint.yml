name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          pip install ".[dev]"

      - name: Lint (ruff)
        continue-on-error: true
        run: python -m ruff check prometheus/

      - name: Format check (ruff)
        run: python -m ruff format prometheus/ --check
