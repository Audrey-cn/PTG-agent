    - {name: "语义压缩", description: "Layer2 创世块+基因模板+语义字典——跨载体共享语义块", immutable: true}
    - {name: "谱系编史", description: "stamp(烙印) / trace(追溯) / append(附史)——完整的编史官能力", immutable: true}
    - {name: "进化追踪", description: "三阶段进化过程，生成进化日志和健康报告", immutable: true}
    - {name: "载体打包", description: "将培育成果打包为新一代 .pgn RNA病毒载体，自动更新族谱", immutable: true}
    - {name: "族谱管理", description: "追踪谱系分叉、解码压缩标记、可视化家族树", immutable: true}
    - {name: "熔炉试炼", description: "四层纵深防御+碳基契约锁——形体完整→血脉纯正→契约校验→力量称量", immutable: true}
    - {name: "休眠守卫", description: "载体抵达即休眠，需显式催化激活", immutable: true}
    - {name: "胞吞与翻译 (Phagocytosis)", description: "吞噬非结构化环境资料或SOP，调用大模型将其翻译并结晶为本地化的硬编码逻辑", immutable: true}
    - {name: "酶促定轨 (Enzymatic Guidance)", description: "反客为主，在内存中释放状态机锁，强行接管并规范宿主 Agent 的多步推理执行流", immutable: true}
    - {name: "阿卡夏受体 (Pheromone Receptor)", description: "费洛蒙感知——通过 IPFS 网关拉取远程 .pgn 载体，经 Crucible 全量试炼后感染自身，实现去中心化传播", immutable: true}
    - {name: "端粒凋亡 (Telomeric Apoptosis)", description: "执行层安全锁——为动态生成的逻辑加注时间与空间端粒，防范死循环与内存溢出（癌变），超时即触发凋亡", immutable: true}
    - {name: "细胞自噬 (Autophagy)", description: "代谢排遗系统——在 evolution 打包阶段，自动扫描并剥离长久未激活或向后不兼容的衰老基因片段，保持载体极致轻盈", immutable: true}
    - {name: "反射中枢 (Reflex Nexus)", description: "语义→工具的神经反射映射——引擎嗅探用户输入中的语义标记，自动匹配并触发对应基因位点，实现从被动调用到语义反射驱动的质变", immutable: true}
    - {name: "代谢心跳 (Metabolic Pulse)", description: "进化节律全自动监测——每轮对话后心跳一次，自动检查进化阈值，达到 evolution 阶段时自动触发自噬并提示版本结晶", immutable: true}
    - {name: "费洛蒙预检 (Manifest Mode)", description: "两阶段加载第一阶段——仅提取 YAML 元数据与能力清单，绝对禁止 zlib 解压或 exec() 执行，为零信任环境提供安全预检机制", immutable: true}
    - {name: "基因囚笼 (Gene Cage)", description: "multiprocessing 进程级物理隔离——变异代码在独立子进程中执行，双重端粒锁保护，崩溃/越权/死循环均不影响宿主进程内存空间", immutable: true}
    - {name: "动态溶酶体 (Dynamic Lysosome)", description: "宿主可注入自定义黑名单与审计规则——引擎优先服从宿主制定的免疫边界，与内置黑名单并集运算统一审计", immutable: true}
    - {name: "外交辞令 (Diplomatic Handshake)", description: "反射中枢检测到高安全宿主信号时主动返回隔离建议——不擅自执行，先请示宿主", immutable: true}

